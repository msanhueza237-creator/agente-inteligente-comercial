services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clima_agent
      POSTGRES_USER: clima_agent
      POSTGRES_PASSWORD: ${AGENT_DB_PASSWORD:?AGENT_DB_PASSWORD is required}
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clima_agent -d clima_agent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build: .
    image: clima-activa-agent:latest
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    image: clima-activa-agent:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build: .
    image: clima-activa-agent:latest
    command: ["python", "-m", "app.scheduler.worker"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  agent_postgres_data:
